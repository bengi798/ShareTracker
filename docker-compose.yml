services:
  postgres:
    image: postgres:16
    container_name: sharetracker-db
    environment:
      POSTGRES_USER: sharetracker
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: ShareTrackerDb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharetracker -d ShareTrackerDb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
